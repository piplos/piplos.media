# Cloudflare Workers — static SvelteKit build (web/site/build)
# Deploy: cd web/site && PUBLIC_API_URL=https://api.piplos.media bun run build && bun run deploy
#
# 404: not_found_handling serves the nearest 404.html in the asset tree:
#   /foo/bar          → build/404.html
#   /en/missing       → build/en/404.html
#   /ru/missing       → build/ru/404.html
#
# 500: Workers static assets have no 500-page option. After deploy, add a zone
# Custom Error Rule (Rules → Custom Errors) for origin 5xx responses pointing to:
#   https://piplos.media/500

name = "piplos-media"
compatibility_date = "2026-06-19"
workers_dev = false
preview_urls = false

[assets]
directory = "./build"
not_found_handling = "404-page"
html_handling = "auto-trailing-slash"
