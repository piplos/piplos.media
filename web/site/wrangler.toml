# Cloudflare Workers — SvelteKit (web/site/.svelte-kit/cloudflare)
# Deploy: cd web/site && bun run build && bun run deploy
#
# PUBLIC_API_URL — override in dashboard Variables or here for wrangler deploy.
# Prerender at build time still reads process env; runtime SSR/client loads use [vars].

name = "piplos-media"
compatibility_date = "2026-06-19"
compatibility_flags = ["nodejs_compat", "nodejs_als"]
workers_dev = false
preview_urls = false
main = ".svelte-kit/cloudflare/_worker.js"

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

[vars]
PUBLIC_API_URL = "https://api.piplos.media"
