name: Release containers

# Build and publish container images to GHCR whenever a version tag is pushed
# (e.g. `git tag v1.2.3 && git push origin v1.2.3`):
#   - ghcr.io/piplos/piplos-api     — Go API (docker/Dockerfile.api)
#   - ghcr.io/piplos/piplos-migrate — one-shot goose migrations (docker/Dockerfile.migrate)
# Admin panel deploys to Cloudflare Workers (web/admin).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

# Opt into Node 24 for JS actions (checkout, docker/*) until upstream ships node24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GHCR_OWNER: piplos

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: piplos-api
            dockerfile: docker/Dockerfile.api
          - image: piplos-migrate
            dockerfile: docker/Dockerfile.migrate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.GHCR_OWNER }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
